          let { top, left, width, height } = cropBox;

            top = Math.max(0, Math.min(100 - height, cropDragInfo.origTop + dy));

        if (!text) return "";

        if (style === 'hiragana') return text.replace(regex, '$2');
        if (style === 'kanji') return text.replace(regex, '$1');
        return text;
      };

      const parseDialogue = (dialogueText, textStyle) => {
        if (!dialogueText) return "";
        const regex = /([^「\n]+?)「([^」]+?)」/g;
        let matches = [...dialogueText.matchAll(regex)];
        if (matches.length > 0) {
          return matches.map(match => {
            const speaker = formatTextForPrompt(match[1].trim(), 'kanji'); 
            const speech = formatTextForPrompt(match[2].trim(), textStyle);
            return `${speaker}'s Speech bubble: "${speech}"`;
          }).join("\n");
        } else {
          return `Speech: "${formatTextForPrompt(dialogueText, textStyle)}"`;
        }
      };

      const renderText = (text) => {
        if (!text) return "";
        const regex = new RegExp("([一-龠々]+)[(（]([\\u3040-\\u309F\\u30A0-\\u30FFー]+)[)）]", "g");
        let processedText = text;
        if (textStyle === 'hiragana') processedText = text.replace(regex, '$2');
        else if (textStyle === 'kanji') processedText = text.replace(regex, '$1');
        else {
          const parts = text.split(regex);
          if (parts.length === 1) return text;
          const res = [];
          for (let i = 0; i < parts.length; i++) {
            if (i % 3 === 0) res.push(<Fragment key={i}>{parts[i]}</Fragment>);
            else if (i % 3 === 1) { res.push(<ruby key={i}>{parts[i]}<rt>{parts[i+1]}</rt></ruby>); i++; }
          }
          return res;
        }

          const natW = img.naturalWidth, natH = img.naturalHeight;
          const containerAspect = rect.width / rect.height;
          const imgAspect = natW / natH;
          let rendW, rendH, ox = 0, oy = 0;
          if (imgAspect > containerAspect) { rendW = rect.width; rendH = rect.width / imgAspect; oy = (rect.height - rendH) / 2; }

          const relL = boxL - ox, relT = boxT - oy;
          let sx = (relL / rendW) * natW, sy = (relT / rendH) * natH;
          let sw = (boxW / rendW) * natW, sh = (boxH / rendH) * natH;
          if (sx < 0) { sw += sx; sx = 0; }

                      <li><strong>「Get API key」をクリック:</strong> 左側のメニュー、または画面上部にある「Get API key（APIキーを取得）」というボタンをクリックします。</li>
                      <li><strong>「Create API key」をクリック:</strong> 「Create API key（APIキーを作成）」のボタンをクリックします。</li>
                      <li><strong>プロジェクトの作成:</strong> 「キー名の設定」は「Gemini API key」から任意の文字列に書き換えても可能です。「インポートしたプロジェクトを選択」では、初めての場合は「プロジェクトを作成」から、新しいプロジェクトの名前で作成してください。「キーを作成」を押します。</li>
                      <li><strong>キーのコピー:</strong> <code>AIzaSy...</code> から始まる長い文字列が表示されます。「Copy」ボタンを押してコピーし、このアプリの入力欄に貼り付けてください。</li>
                    </ol>
                  </div>

                </div>

                <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: '20px', paddingTop: '20px', borderTop: '1px solid #e2e8f0', flexShrink: 0 }}>
                  <button 
                    onClick={() => setShowHelpModal(false)}
                    style={{ padding: '12px 32px', backgroundColor: '#e2e8f0', color: '#475569', borderRadius: '12px', fontWeight: 'bold', fontSize: '16px', border: 'none', cursor: 'pointer' }}
                  >
                    閉じる
                  </button>
                </div>
              </div>
            </div>
          )}

          {showCropModal && (
            <div className="no-print" style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', backgroundColor: 'rgba(0,0,0,0.8)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 3000, touchAction: 'none' }}>
              <div style={{ backgroundColor: '#1e293b', borderRadius: '16px', width: '90%', maxWidth: '600px', padding: '24px', display: 'flex', flexDirection: 'column', gap: '16px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <h3 style={{ color: 'white', margin: 0, fontSize: '18px' }}>画像の切り抜き</h3>
                  <button onClick={() => { setShowCropModal(false); setCropTargetId(null); }} style={{ background: 'none', border: 'none', color: '#94a3b8', cursor: 'pointer', fontSize: '20px' }}><i className="fas fa-times"></i></button>
                </div>
                <div ref={cropContainerRef} style={{ width: '100%', height: '400px', backgroundColor: '#0f172a', position: 'relative', overflow: 'hidden', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <img src={cropImageSrc} style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain', pointerEvents: 'none' }} alt="crop target" />
                  <div style={{ position: 'absolute', top: `${cropBox.top}%`, left: `${cropBox.left}%`, width: `${cropBox.width}%`, height: `${cropBox.height}%`, border: '2px solid #3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.2)', cursor: 'move', boxSizing: 'border-box' }} onPointerDown={(e) => { e.preventDefault(); setCropDragInfo({ startX: e.clientX, startY: e.clientY, origTop: cropBox.top, origLeft: cropBox.left, origWidth: cropBox.width, origHeight: cropBox.height, action: 'move' }); }}>
                    <div style={{ position: 'absolute', top: '-6px', left: '-6px', width: '12px', height: '12px', backgroundColor: 'white', border: '2px solid #3b82f6', borderRadius: '50%', cursor: 'nwse-resize' }} onPointerDown={(e) => { e.stopPropagation(); setCropDragInfo({ startX: e.clientX, startY: e.clientY, origTop: cropBox.top, origLeft: cropBox.left, origWidth: cropBox.width, origHeight: cropBox.height, action: 'nw' }); }} />
                    <div style={{ position: 'absolute', top: '-6px', right: '-6px', width: '12px', height: '12px', backgroundColor: 'white', border: '2px solid #3b82f6', borderRadius: '50%', cursor: 'nesw-resize' }} onPointerDown={(e) => { e.stopPropagation(); setCropDragInfo({ startX: e.clientX, startY: e.clientY, origTop: cropBox.top, origLeft: cropBox.left, origWidth: cropBox.width, origHeight: cropBox.height, action: 'ne' }); }} />
                    <div style={{ position: 'absolute', bottom: '-6px', left: '-6px', width: '12px', height: '12px', backgroundColor: 'white', border: '2px solid #3b82f6', borderRadius: '50%', cursor: 'nesw-resize' }} onPointerDown={(e) => { e.stopPropagation(); setCropDragInfo({ startX: e.clientX, startY: e.clientY, origTop: cropBox.top, origLeft: cropBox.left, origWidth: cropBox.width, origHeight: cropBox.height, action: 'sw' }); }} />
                    <div style={{ position: 'absolute', bottom: '-6px', right: '-6px', width: '12px', height: '12px', backgroundColor: 'white', border: '2px solid #3b82f6', borderRadius: '50%', cursor: 'nwse-resize' }} onPointerDown={(e) => { e.stopPropagation(); setCropDragInfo({ startX: e.clientX, startY: e.clientY, origTop: cropBox.top, origLeft: cropBox.left, origWidth: cropBox.width, origHeight: cropBox.height, action: 'se' }); }} />
                  </div>
                </div>
                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '12px' }}>
                  <button onClick={() => { setShowCropModal(false); setCropTargetId(null); }} style={{ padding: '10px 16px', backgroundColor: '#334155', color: 'white', borderRadius: '8px', fontWeight: 'bold', border: 'none', cursor: 'pointer' }}>キャンセル</button>
                  <button onClick={executeCrop} style={{ padding: '10px 24px', backgroundColor: '#3b82f6', color: 'white', borderRadius: '8px', fontWeight: 'bold', border: 'none', cursor: 'pointer' }}><i className="fas fa-crop"></i> 切り抜く</button>
                </div>
              </div>
            </div>
          )}

          {showPromptModal && (
            <div className="no-print" style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', backgroundColor: 'rgba(0,0,0,0.8)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
              <div style={{ backgroundColor: 'white', borderRadius: '16px', width: '80%', maxWidth: '800px', display: 'flex', flexDirection: 'column', boxShadow: '0 10px 25px rgba(0,0,0,0.5)', padding: '32px' }}>
                <h3 style={{ fontSize: '24px', fontWeight: '900', marginBottom: '16px', color: '#1e293b' }}>ほかのAIで画像生成するためのプロンプト</h3>
                
                <div style={{ marginBottom: '16px' }}>
                  <label style={{ display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer', fontSize: '16px', fontWeight: 'bold', color: '#334155' }}>
                    <input 
                      type="checkbox" 
                      checked={includePanelNumbers} 
                      onChange={(e) => setIncludePanelNumbers(e.target.checked)} 
                      style={{ width: '20px', height: '20px', cursor: 'pointer' }}
                    />
                    各コマに番号（1, 2, 3, 4）を付ける
                  </label>
                </div>

                <textarea readOnly value={generatePromptText()} style={{ width: '100%', height: '300px', padding: '16px', border: '2px solid #cbd5e1', borderRadius: '8px', fontSize: '14px', fontFamily: 'monospace', outline: 'none', backgroundColor: '#f8fafc', marginBottom: '16px' }} />
                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '16px' }}>
                  <button onClick={() => setShowPromptModal(false)} style={{ padding: '12px 24px', backgroundColor: '#e2e8f0', color: '#475569', borderRadius: '8px', fontWeight: 'bold', fontSize: '16px', cursor: 'pointer', border: 'none' }}>閉じる</button>
                  <button onClick={() => copyToClipboard(generatePromptText())} style={{ padding: '12px 32px', backgroundColor: '#2563eb', color: 'white', borderRadius: '8px', fontWeight: 'bold', fontSize: '16px', display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer', border: 'none' }}><i className="fas fa-copy"></i>コピーする</button>
                </div>
              </div>
            </div>
          )}

          {showSaveModal && (
            <div className="no-print" style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', backgroundColor: 'rgba(0,0,0,0.8)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
              <div style={{ backgroundColor: 'white', borderRadius: '16px', width: '90%', maxWidth: '500px', display: 'flex', flexDirection: 'column', boxShadow: '0 10px 25px rgba(0,0,0,0.5)', padding: '32px' }}>
                <h3 style={{ fontSize: '24px', fontWeight: '900', marginBottom: '24px', color: '#1e293b' }}>プリントデータの保存（レイアウトを含む）</h3>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', backgroundColor: '#f1f5f9', padding: '12px 16px', borderRadius: '8px', marginBottom: '32px', border: '2px solid #e2e8f0' }}>
                   <input type="text" value={saveFileName} onChange={(e) => setSaveFileName(e.target.value)} style={{ flex: 1, backgroundColor: 'transparent', outline: 'none', fontWeight: 'bold', fontSize: '20px', border: 'none' }} autoFocus />
                   <span style={{ color: '#94a3b8', fontWeight: 'bold', fontSize: '20px' }}>.json</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '16px' }}>
                  <button onClick={() => setShowSaveModal(false)} style={{ padding: '12px 24px', backgroundColor: '#e2e8f0', color: '#475569', borderRadius: '8px', fontWeight: 'bold', fontSize: '16px', cursor: 'pointer', border: 'none' }}>キャンセル</button>
                  <button onClick={executeSave} style={{ padding: '12px 32px', backgroundColor: '#2563eb', color: 'white', borderRadius: '8px', fontWeight: 'bold', fontSize: '16px', cursor: 'pointer', border: 'none' }}>データを保存する</button>
                </div>
              </div>
            </div>
          )}

          {showCopyMessage && (
            <div className="no-print" style={{ position: 'fixed', bottom: '40px', left: '50%', transform: 'translateX(-50%)', backgroundColor: 'white', color: '#0f172a', padding: '16px 32px', borderRadius: '30px', fontWeight: '900', fontSize: '18px', display: 'flex', alignItems: 'center', gap: '12px', zIndex: 1000, boxShadow: '0 10px 25px rgba(0,0,0,0.3)', border: '3px solid #10b981' }}>
              <i className="fas fa-check-circle" style={{ color: '#10b981', fontSize: '24px' }}></i> {saveMessageText}
            </div>
          )}

          {scenarioToDelete && (
            <div className="no-print" style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', backgroundColor: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 3000 }}>
              <div style={{ backgroundColor: 'white', borderRadius: '16px', width: '90%', maxWidth: '400px', padding: '24px', display: 'flex', flexDirection: 'column', gap: '16px', boxShadow: '0 20px 25px -5px rgba(0, 0, 0, 0.1)' }}>
                <h3 style={{ fontSize: '18px', fontWeight: 'bold', color: '#1e293b', margin: 0 }}>シナリオの削除</h3>
                <p style={{ fontSize: '14px', color: '#475569', margin: 0, lineHeight: '1.5' }}>「{scenarioToDelete}」をマイシナリオから削除しますか？<br/>この操作は取り消せません。</p>
                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '12px', marginTop: '8px' }}>
                  <button onClick={() => setScenarioToDelete(null)} style={{ padding: '10px 16px', backgroundColor: '#e2e8f0', color: '#475569', borderRadius: '8px', fontWeight: 'bold', border: 'none', cursor: 'pointer' }}>キャンセル</button>
                  <button onClick={executeDeleteMyScenario} style={{ padding: '10px 16px', backgroundColor: '#ef4444', color: 'white', borderRadius: '8px', fontWeight: 'bold', border: 'none', cursor: 'pointer' }}>削除する</button>
                </div>
              </div>
            </div>
          )}

          {showExportModal && exportTargetScenario && (
            <div className="no-print" style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', backgroundColor: 'rgba(0,0,0,0.8)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 3000 }}>
              <div style={{ backgroundColor: 'white', borderRadius: '16px', width: '90%', maxWidth: '500px', display: 'flex', flexDirection: 'column', boxShadow: '0 10px 25px rgba(0,0,0,0.5)', padding: '32px' }}>
                <h3 style={{ fontSize: '24px', fontWeight: '900', marginBottom: '16px', color: '#1e293b' }}>シナリオデータの書き出し</h3>
                <p style={{ fontSize: '14px', color: '#475569', marginBottom: '24px', lineHeight: '1.5' }}>
                  マイシナリオをファイルに書き出して、他の人と共有したりバックアップとして保存できます。<br/>
                  ファイル名に含める「あなたの名前」を入力してください。
                </p>
                
                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '24px' }}>
                  <label style={{ fontSize: '14px', fontWeight: 'bold', color: '#64748b' }}>あなたの名前</label>
                  <input 
                    type="text" 
                    placeholder="例：山田" 
                    value={authorName} 
                    onChange={(e) => setAuthorName(e.target.value)} 
                    style={{ width: '100%', padding: '12px 16px', borderRadius: '8px', border: '2px solid #e2e8f0', fontSize: '16px', fontWeight: 'bold', outline: 'none' }} 
                    autoFocus
                  />
                </div>

                <div style={{ backgroundColor: '#f1f5f9', padding: '12px 16px', borderRadius: '8px', marginBottom: '32px', border: '2px solid #e2e8f0', display: 'flex', flexDirection: 'column', gap: '4px' }}>
                   <span style={{ fontSize: '12px', fontWeight: 'bold', color: '#64748b' }}>出力されるファイル名：</span>
                   <span style={{ fontWeight: 'bold', fontSize: '16px', color: '#1e293b', wordBreak: 'break-all' }}>
                     自活プリ-{authorName.trim() || '〇〇'}のシナリオ-{exportTargetScenario.title.replace(new RegExp("[(（][^)）]+[)）]", "g"), '').replace(new RegExp("\\s+", "g"), '_')}.json
                   </span>
                </div>

                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '16px' }}>
                  <button onClick={() => { setShowExportModal(false); setExportTargetScenario(null); }} style={{ padding: '12px 24px', backgroundColor: '#e2e8f0', color: '#475569', borderRadius: '8px', fontWeight: 'bold', fontSize: '16px', cursor: 'pointer', border: 'none' }}>キャンセル</button>
                  <button onClick={executeExportScenario} style={{ padding: '12px 32px', backgroundColor: '#2563eb', color: 'white', borderRadius: '8px', fontWeight: 'bold', fontSize: '16px', cursor: 'pointer', border: 'none' }}>ファイルに書き出す</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
