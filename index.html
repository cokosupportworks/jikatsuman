      const formatTextForPrompt = (text, style) => {
        if (!text) return "";
        const regex = /([一-龠々]+)[(（]([\u3040-\u309F\u30A0-\u30FFー]+)[)）]/g;
        if (style === 'hiragana') return text.replace(regex, '$2');
        if (style === 'kanji') return text.replace(regex, '$1');
        return text;
      };

      const renderText = (text) => {
        if (!text) return "";
        const regex = /([一-龠々]+)[(（]([\u3040-\u309F\u30A0-\u30FFー]+)[)）]/g;
        let processedText = text;
        if (textStyle === 'hiragana') processedText = text.replace(regex, '$2');
        else if (textStyle === 'kanji') processedText = text.replace(regex, '$1');
        else {
          const parts = text.split(regex);
          if (parts.length === 1) return text;
          const result = [];
          for (let i = 0; i < parts.length; i++) {
            if (i % 3 === 0) { result.push(<React.Fragment key={i}>{parts[i]}</React.Fragment>); }
            else if (i % 3 === 1) { result.push(<ruby key={i}>{parts[i]}<rt>{parts[i + 1]}</rt></ruby>); i++; }
          }
          return result;
        }
        return processedText;
      };

        } else {
          setElements(prev => prev.map(el => {

            if (el.id === 'title') return { ...el, text: worksheetTitle };

        setSelectedId(id);
        const el = elements.find(e => e.id === id);

        setDragInfo({ id, action, startX: e.clientX, startY: e.clientY, origX: el.x, origY: el.y, origW: el.width, origH: el.height });
      };

      useEffect(() => {
        const handlePointerMove = (e) => {
          if (!dragInfo) return;
          const innerScale = bindingMargin ? 0.88 : 1.0;
          const effectiveZoom = zoom * innerScale;
          const dx = (e.clientX - dragInfo.startX) / effectiveZoom;
          const dy = (e.clientY - dragInfo.startY) / effectiveZoom;
          
          setElements(prev => prev.map(el => {
            if (el.id === dragInfo.id) {
              if (dragInfo.action === 'move') return { ...el, x: dragInfo.origX + dx, y: dragInfo.origY + dy };

            }
            return el;
          }));
        };
        const handlePointerUp = () => setDragInfo(null);
        window.addEventListener('pointermove', handlePointerMove);
        window.addEventListener('pointerup', handlePointerUp);

①領域・項目：${targetDomain} - ${targetItem}

4コマ目：うまくできた結果（笑顔など）`;

        try {
          let retries = 0; const maxRetries = 5; let response;
          while (retries < maxRetries) {
            response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: promptText }] }],
                generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { panels: { type: "ARRAY", items: { type: "OBJECT", properties: { scene: { type: "STRING" }, dialogue: { type: "STRING" } } } } } } }
              })
            });
            if (response.ok) break;
            retries++; await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
          }
          if (!response.ok) throw new Error('API Error');
          const result = await response.json();
          const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!text) throw new Error('No Text');

        return `Create a page of a Japanese educational manga with 4 panels arranged in a 2x2 grid.\nStyle: Clean anime illustration, child-friendly, Japanese elementary school textbook style.\n\nCRITICAL INSTRUCTION:\nDraw white speech bubbles containing the EXACT Japanese dialogue provided below. ${textStyleInstruction}\nDo NOT write Panel numbers or Visual Scene descriptions in the drawing.\n\nTheme: ${formatTextForPrompt(targetDomain, 'kanji')}\n\nPanel 1:\nScene: ${formatTextForPrompt(mangaData.panels[0].scene, 'kanji')}\nSpeech: "${formatTextForPrompt(mangaData.panels[0].dialogue, textStyle)}"\n\nPanel 2:\nScene: ${formatTextForPrompt(mangaData.panels[1].scene, 'kanji')}\nSpeech: "${formatTextForPrompt(mangaData.panels[1].dialogue, textStyle)}"\n\nPanel 3:\nScene: ${formatTextForPrompt(mangaData.panels[2].scene, 'kanji')}\nSpeech: "${formatTextForPrompt(mangaData.panels[2].dialogue, textStyle)}"\n\nPanel 4:\nScene: ${formatTextForPrompt(mangaData.panels[3].scene, 'kanji')}\nSpeech: "${formatTextForPrompt(mangaData.panels[3].dialogue, textStyle)}"`;

          const result = await response.json();
          const base64Data = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
          if (!base64Data) throw new Error('No Image');
          setElements(prev => prev.map(el => el.type === 'manga_placeholder' ? { ...el, src: `data:image/png;base64,${base64Data}` } : el));
        } catch(err) { setErrorMessage(`画像生成に失敗しました。`); } finally { setIsGeneratingImage(false); }
      };

      const renderElements = (isPreviewMode) => {
        const innerScale = bindingMargin ? 0.88 : 1.0;
        const offsetX = bindingMargin ? 95 : 0; 
        const offsetY = bindingMargin ? 40 : 0;

        return elements.map(el => {
          const left = el.x * innerScale + offsetX;
          const top = el.y * innerScale + offsetY;
          const width = el.width * innerScale;
          const height = el.height * innerScale;
          const fontSize = el.fontSize * innerScale;
          const padding = (el.padding || 8) * innerScale;
          const borderRadius = (el.borderRadius || 0) * innerScale;
          const borderWidth = Math.max(1, 3 * innerScale);

          const baseBorder = el.border ? `${borderWidth}px solid #1e293b` : 'none';
          const bottomBorder = el.borderBottom ? `${borderWidth}px solid #1e293b` : baseBorder;
          
          return (
            <div key={el.id} className={`absolute ${isPreviewMode && selectedId === el.id ? 'z-50' : 'z-10'}`}

                left: `${left}px`, top: `${top}px`, width: `${width}px`, height: `${height}px`, 
                backgroundColor: el.bg || 'transparent', boxSizing: 'border-box',
                borderTop: baseBorder, borderLeft: el.border ? baseBorder : 'none', borderRight: el.border ? baseBorder : 'none', borderBottom: bottomBorder,
                borderRadius: `${borderRadius}px`, 
                cursor: isPreviewMode ? 'move' : 'default', 
                outline: isPreviewMode && selectedId === el.id ? '3px solid #3b82f6' : 'none', outlineOffset: '2px'
              }} 
              onPointerDown={(e) => isPreviewMode && handlePointerDown(e, el.id, 'move')}>
              
              {el.type === 'text' && (
                <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', boxSizing: 'border-box', padding: `${padding}px`, justifyContent: el.align === 'center' ? 'center' : 'flex-start' }}>
                  {isPreviewMode && selectedId === el.id && isEditingTextId === el.id ? 
                    <textarea autoFocus value={el.text} onChange={(e) => updateElement(el.id, { text: e.target.value })} onBlur={() => setIsEditingTextId(null)} className="custom-scroll no-print" style={{ width: '100%', height: '100%', backgroundColor: 'transparent', outline: 'none', resize: 'none', border: 'none', textAlign: el.align, fontSize: `${fontSize}px`, fontWeight: el.fontWeight }} /> :
                    <div onDoubleClick={() => isPreviewMode && setIsEditingTextId(el.id)} style={{ width: '100%', wordBreak: 'keep-all', whiteSpace: 'pre-wrap', display: 'block', textAlign: el.align, fontSize: `${fontSize}px`, fontWeight: el.fontWeight, lineHeight: 1.8 }}>{renderText(el.text)}</div>
                  }
                </div>
              )}

              {el.type === 'image' && <img src={el.src} style={{ width: '100%', height: '100%', objectFit: 'contain', pointerEvents: 'none' }} alt="" />}
              
              {el.type === 'manga_placeholder' && (
                <div style={{ width: '100%', height: '100%', position: 'relative', backgroundColor: '#f8fafc', display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: `${16 * innerScale}px`, overflow: 'hidden', boxSizing: 'border-box', border: `${Math.max(1, 4 * innerScale)}px solid #1e293b` }}>
                  {el.src ? <img src={el.src} style={{ width: '100%', height: '100%', objectFit: 'contain' }} alt="" /> : <div style={{ textAlign: 'center', color: '#cbd5e1' }} className="no-print"><i className="fas fa-image" style={{ fontSize: `${80 * innerScale}px`, opacity: 0.5 }}></i></div>}
                  {isPreviewMode && <button onClick={handleGenerateComic} disabled={isGeneratingImage} className="no-print" style={{ position: 'absolute', bottom: '20px', right: '20px', backgroundColor: '#2563eb', color: 'white', padding: '10px 20px', borderRadius: '40px', fontWeight: 'bold', boxShadow: '0 10px 20px rgba(0,0,0,0.2)', display: 'flex', alignItems: 'center', gap: '10px', fontSize: '18px' }}>
                    <i className={`fas fa-sync ${isGeneratingImage ? 'fa-spin' : ''}`}></i> Gemini 2.5 Flashで画像生成
                  </button>}
                </div>
              )}

              {isPreviewMode && selectedId === el.id && <div className="no-print" style={{ position: 'absolute', right: '-15px', bottom: '-15px', width: '30px', height: '30px', backgroundColor: 'white', border: '3px solid #3b82f6', borderRadius: '50%', cursor: 'se-resize', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#3b82f6', boxShadow: '0 5px 10px rgba(0,0,0,0.2)' }} onPointerDown={(e) => handlePointerDown(e, el.id, 'resize')}><i className="fas fa-expand-alt" style={{ fontSize: '12px' }}></i></div>}
            </div>
          );
        });
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', width: '100vw', backgroundColor: step === 'preview' ? '#0f172a' : '#f8fafc', overflow: 'hidden' }}>

            <div className="no-print" style={{ position: 'fixed', top: '20px', left: '50%', transform: 'translateX(-50%)', backgroundColor: '#ef4444', color: 'white', padding: '12px 24px', borderRadius: '30px', fontWeight: 'bold', fontSize: '16px', display: 'flex', alignItems: 'center', gap: '12px', zIndex: 1000, boxShadow: '0 10px 25px rgba(0,0,0,0.3)' }}>

            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
              <i className="fas fa-border-all" style={{ color: '#60a5fa', fontSize: '24px' }}></i>

              {step !== 'environment_check' && (

            </div>

            {step === 'domain_selection' && (
              <div style={{ flex: 1, display: 'flex', padding: '24px', gap: '24px' }}>

                  <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}><label style={{ fontSize: '14px', fontWeight: 'bold', color: '#475569' }}>説明文</label><textarea value={scenario} onChange={(e) => setScenario(e.target.value)} style={{ padding: '12px', border: '1px solid #cbd5e1', borderRadius: '12px', fontSize: '14px', height: '100px', resize: 'none', outline: 'none' }} /></div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}><label style={{ fontSize: '14px', fontWeight: 'bold', color: '#475569' }}>ポイント（ねらい）</label><textarea value={customGoal} onChange={(e) => setCustomGoal(e.target.value)} style={{ padding: '12px', border: '1px solid #cbd5e1', borderRadius: '12px', fontSize: '14px', height: '100px', resize: 'none', outline: 'none' }} /></div>
                  <div style={{ display: 'flex', gap: '16px', marginTop: 'auto' }}>
                    <button onClick={() => setStep('domain_selection')} style={{ padding: '16px 24px', backgroundColor: '#e2e8f0', color: '#475569', borderRadius: '12px', fontSize: '16px', fontWeight: 'bold', display: 'flex', alignItems: 'center', gap: '8px' }}><i className="fas fa-chevron-left"></i> 戻る</button>
                    <button onClick={() => setStep('manual_edit')} disabled={!scenario || !worksheetTitle} style={{ flex: 1, padding: '16px', backgroundColor: (!scenario || !worksheetTitle) ? '#cbd5e1' : '#2563eb', color: 'white', borderRadius: '12px', fontSize: '18px', fontWeight: 'bold', display: 'flex', justifyContent: 'center', alignItems: 'center', gap: '8px' }}>次へ <i className="fas fa-chevron-right"></i></button>
                  </div>
                </div>
              </div>

                </div>
                <div style={{ flex: 1, display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '16px', overflowY: 'auto', alignContent: 'start' }} className="custom-scroll">

                      <div style={{ fontSize: '12px', fontWeight: 'bold', color: '#475569' }}>コマ {i+1}</div>
                      <textarea placeholder="絵の指示" value={p.scene} onChange={(e) => { const n = [...mangaData.panels]; n[i].scene = e.target.value; setMangaData({ panels: n }); }} style={{ flex: 1, minHeight: '80px', padding: '12px', border: '1px solid #e2e8f0', borderRadius: '8px', fontSize: '12px', backgroundColor: '#f8fafc', resize: 'none', outline: 'none' }} />
                      <textarea placeholder="セリフ" value={p.dialogue} onChange={(e) => { const n = [...mangaData.panels]; n[i].dialogue = e.target.value; setMangaData({ panels: n }); }} style={{ flex: 1, minHeight: '100px', padding: '12px', border: '1px solid #bfdbfe', borderRadius: '8px', fontSize: '14px', fontWeight: 'bold', resize: 'none', outline: 'none' }} />

          {/* モーダル群 (no-print) */}
          {showPromptModal && (
            <div className="no-print" style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', backgroundColor: 'rgba(0,0,0,0.8)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
              <div style={{ backgroundColor: 'white', borderRadius: '16px', width: '80%', maxWidth: '800px', display: 'flex', flexDirection: 'column', boxShadow: '0 10px 25px rgba(0,0,0,0.5)', padding: '32px' }}>
                <h3 style={{ fontSize: '24px', fontWeight: '900', marginBottom: '16px', color: '#1e293b' }}>AI画像生成用プロンプト</h3>
                <textarea readOnly value={generatePromptText()} style={{ width: '100%', height: '300px', padding: '16px', border: '2px solid #cbd5e1', borderRadius: '8px', fontSize: '14px', fontFamily: 'monospace', outline: 'none', backgroundColor: '#f8fafc', marginBottom: '16px' }} />
                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '16px' }}>
                  <button onClick={() => setShowPromptModal(false)} style={{ padding: '12px 24px', backgroundColor: '#e2e8f0', color: '#475569', borderRadius: '8px', fontWeight: 'bold', fontSize: '16px' }}>閉じる</button>
                  <button onClick={() => copyToClipboard(generatePromptText())} style={{ padding: '12px 32px', backgroundColor: '#2563eb', color: 'white', borderRadius: '8px', fontWeight: 'bold', fontSize: '16px', display: 'flex', alignItems: 'center', gap: '8px' }}><i className="fas fa-copy"></i>コピーする</button>
                </div>
              </div>
            </div>
          )}

          {showSaveModal && (
            <div className="no-print" style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', backgroundColor: 'rgba(0,0,0,0.8)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
              <div style={{ backgroundColor: 'white', borderRadius: '16px', width: '90%', maxWidth: '500px', display: 'flex', flexDirection: 'column', boxShadow: '0 10px 25px rgba(0,0,0,0.5)', padding: '32px' }}>
                <h3 style={{ fontSize: '24px', fontWeight: '900', marginBottom: '24px', color: '#1e293b' }}>保存ファイル名の設定</h3>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', backgroundColor: '#f1f5f9', padding: '12px 16px', borderRadius: '8px', marginBottom: '32px', border: '2px solid #e2e8f0' }}>
                   <input type="text" value={saveFileName} onChange={(e) => setSaveFileName(e.target.value)} style={{ flex: 1, backgroundColor: 'transparent', outline: 'none', fontWeight: 'bold', fontSize: '20px' }} autoFocus />
                   <span style={{ color: '#94a3b8', fontWeight: 'bold', fontSize: '20px' }}>.json</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '16px' }}>
                  <button onClick={() => setShowSaveModal(false)} style={{ padding: '12px 24px', backgroundColor: '#e2e8f0', color: '#475569', borderRadius: '8px', fontWeight: 'bold', fontSize: '16px' }}>キャンセル</button>
                  <button onClick={executeSave} style={{ padding: '12px 32px', backgroundColor: '#2563eb', color: 'white', borderRadius: '8px', fontWeight: 'bold', fontSize: '16px' }}>保存を実行</button>
                </div>
              </div>
            </div>
          )}

          {showCopyMessage && (
            <div className="no-print" style={{ position: 'fixed', bottom: '40px', left: '50%', transform: 'translateX(-50%)', backgroundColor: 'white', color: '#0f172a', padding: '16px 32px', borderRadius: '30px', fontWeight: '900', fontSize: '18px', display: 'flex', alignItems: 'center', gap: '12px', zIndex: 1000, boxShadow: '0 10px 25px rgba(0,0,0,0.3)', border: '3px solid #10b981' }}>
              <i className="fas fa-check-circle" style={{ color: '#10b981', fontSize: '24px' }}></i> 保存またはコピーが完了しました
            </div>
          )}

        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
