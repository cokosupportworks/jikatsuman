      const formatTextForPrompt = (text, style) => {
        if (!text) return "";
        const regex = /([一-龠々]+)[(（]([\u3040-\u309F\u30A0-\u30FFー]+)[)）]/g;
        if (style === 'hiragana') return text.replace(regex, '$2');
        if (style === 'kanji') return text.replace(regex, '$1');
        return text;
      };

      const renderText = (text) => {
        if (!text) return "";
        const regex = /([一-龠々]+)[(（]([\u3040-\u309F\u30A0-\u30FFー]+)[)）]/g;
        let processedText = text;
        if (textStyle === 'hiragana') processedText = text.replace(regex, '$2');
        else if (textStyle === 'kanji') processedText = text.replace(regex, '$1');
        else {
          const parts = text.split(regex);
          if (parts.length === 1) return text;
          const result = [];
          for (let i = 0; i < parts.length; i++) {
            if (i % 3 === 0) {
              result.push(<React.Fragment key={i}>{parts[i]}</React.Fragment>);
            } else if (i % 3 === 1) {
              const kanji = parts[i];
              const kana = parts[i + 1];
              result.push(
                <ruby key={i}>
                  {kanji}<rt>{kana}</rt>
                </ruby>
              );
              i++; 
            }
          }
          return result;
        }
        return processedText;
      };

      useEffect(() => {
        if (step === 'preview' && elements.length === 0) {
          const initialElements = [

            { id: 'scenario', type: 'text', text: scenario + (textStyle === 'hiragana' ? ' （　）に あてはまる ことばを かんがえましょう。' : ' （　）に あてはまる 言葉(ことば)を 考(かんが)えましょう。'), x: 10, y: 150, width: 698, height: 50, fontSize: 16, align: 'center' },

            { id: 'goal', type: 'text', text: (textStyle === 'hiragana' ? 'ぽいんと：' : 'ポイント：') + customGoal, x: 10, y: 920, width: 698, height: 90, fontSize: 16, fontWeight: 'bold', border: true, borderRadius: 16, padding: 15, borderColor: '#334155', bg: '#fffbeb' }
          ];
          setElements(initialElements);
        }
      }, [step]);

      const containerRef = useRef(null);

      const handlePointerDown = (e, id, action) => {
        if (step !== 'preview') return;
        e.stopPropagation();
        setSelectedId(id);
        const el = elements.find(e => e.id === id);
        if (!el) return;

        setDragInfo({
          id, action,
          startX: e.clientX, startY: e.clientY,
          origX: el.x, origY: el.y,
          origW: el.width, origH: el.height
        });
      };

      useEffect(() => {
        const handlePointerMove = (e) => {
          if (!dragInfo) return;
          const dx = e.clientX - dragInfo.startX;
          const dy = e.clientY - dragInfo.startY;

          setElements(prev => prev.map(el => {
            if (el.id === dragInfo.id) {
              if (dragInfo.action === 'move') {
                return { ...el, x: dragInfo.origX + dx, y: dragInfo.origY + dy };
              } else if (dragInfo.action === 'resize') {
                return { ...el, width: Math.max(50, dragInfo.origW + dx), height: Math.max(30, dragInfo.origH + dy) };
              }
            }
            return el;
          }));
        };

        const handlePointerUp = () => {
          if (dragInfo) setDragInfo(null);
        };

        window.addEventListener('pointermove', handlePointerMove);
        window.addEventListener('pointerup', handlePointerUp);
        return () => {
          window.removeEventListener('pointermove', handlePointerMove);
          window.removeEventListener('pointerup', handlePointerUp);
        };
      }, [dragInfo]);

      const updateElement = (id, changes) => {
        setElements(prev => prev.map(el => el.id === id ? { ...el, ...changes } : el));
      };

      const deleteElement = (id) => {
        setElements(prev => prev.filter(el => el.id !== id));
        setSelectedId(null);
      };

      const addNewText = () => {
        const newEl = {
          id: `text_${Date.now()}`,
          type: 'text',
          text: '新しいテキスト',
          x: 100, y: 100, width: 200, height: 50,
          fontSize: 16,
          align: 'left'

        setElements([...elements, newEl]);
        setSelectedId(newEl.id);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const newEl = {
              id: `image_${Date.now()}`,
              type: 'image',
              src: event.target.result,
              x: 100, y: 100, width: 300, height: 300

            setElements([...elements, newEl]);
            setSelectedId(newEl.id);
          };
          reader.readAsDataURL(file);
        }
      };

      const handleSave = () => {
        const data = {
          targetDomain, targetItem, scenario, textStyle, customGoal, worksheetTitle, mangaData, elements
        };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'jiritsu_print_data.json';
        a.click();
        URL.revokeObjectURL(url);
        setShowCopyMessage(true);
        setTimeout(() => setShowCopyMessage(false), 2000);
      };

      const handleLoad = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if(data.targetDomain) setTargetDomain(data.targetDomain);
            if(data.targetItem) setTargetItem(data.targetItem);
            if(data.scenario) setScenario(data.scenario);
            if(data.textStyle) setTextStyle(data.textStyle);
            if(data.customGoal) setCustomGoal(data.customGoal);
            if(data.worksheetTitle) setWorksheetTitle(data.worksheetTitle);
            if(data.mangaData) setMangaData(data.mangaData);
            if(data.elements) setElements(data.elements);
            setStep('preview');
          } catch(err) {
            setErrorMessage('ファイルの読み込みに失敗しました');
          }
        };
        reader.readAsText(file);
      };

      const generatePromptText = () => {
        let textStyleInstruction = "";
        if (textStyle === "ruby") {
          textStyleInstruction = "Include small Furigana strictly placed above the Kanji characters.";
        } else if (textStyle === "hiragana") {
          textStyleInstruction = "Use ONLY Japanese Hiragana characters. ABSOLUTELY NO Kanji.";
        } else {
          textStyleInstruction = "Use standard Japanese text.";
        }

        return `Create a page of a Japanese educational manga with 4 panels arranged in a 2x2 grid.
Style: Clean anime illustration, child-friendly, Japanese elementary school textbook style.

CRITICAL INSTRUCTION:
Draw white speech bubbles containing the EXACT Japanese dialogue provided below. ${textStyleInstruction}
Do NOT write Panel numbers or Visual Scene descriptions in the drawing.

Theme: ${formatTextForPrompt(targetDomain, 'kanji')}

Panel 1:
Scene: ${formatTextForPrompt(mangaData.panels[0].scene, 'kanji')}
Speech: "${formatTextForPrompt(mangaData.panels[0].dialogue, textStyle)}"

Panel 2:
Scene: ${formatTextForPrompt(mangaData.panels[1].scene, 'kanji')}
Speech: "${formatTextForPrompt(mangaData.panels[1].dialogue, textStyle)}"

Panel 3:
Scene: ${formatTextForPrompt(mangaData.panels[2].scene, 'kanji')}
Speech: "${formatTextForPrompt(mangaData.panels[2].dialogue, textStyle)}"

Panel 4:
Scene: ${formatTextForPrompt(mangaData.panels[3].scene, 'kanji')}
Speech: "${formatTextForPrompt(mangaData.panels[3].dialogue, textStyle)}"`;
      };

      const handleGenerateComic = async () => {
        setIsGeneratingImage(true);
        setErrorMessage(null);

        const apiKey = "";
        const promptText = generatePromptText();

        try {
          let retries = 0;
          const maxRetries = 5;
          let response;
          while (retries < maxRetries) {
            response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: promptText }] }],
                generationConfig: { responseModalities: ["IMAGE"] }
              })
            });
            if (response.ok) break;
            retries++;
            await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
          }
          
          if (!response.ok) throw new Error('API Error');
          const result = await response.json();
          const base64Data = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
          if (!base64Data) throw new Error('No Image');
          
          const imageUrl = `data:image/png;base64,${base64Data}`;
          
          setElements(prev => prev.map(el => el.type === 'manga_placeholder' ? { ...el, src: imageUrl } : el));

        } catch(err) {
          console.error(err);
          setErrorMessage(`画像生成に失敗しました。時間をおいて再度お試しください。`);
        } finally {
          setIsGeneratingImage(false);
        }
      };

      return (
        <div className={step === 'preview' ? "w-full min-h-screen bg-slate-800 font-sans print:bg-white print:p-0 flex flex-col items-center" : "fixed inset-0 bg-slate-100 flex items-center justify-center overflow-hidden font-sans select-none touch-none"}>

                      >

                        <span className="text-2xl font-black">iPad / 個人のPC</span>
                        <span className="text-xs font-bold text-blue-500 mt-1 bg-blue-100 px-3 py-1 rounded-full">アプリ内で画像を自動生成</span>
                      </button>
                      <button 
                        onClick={() => { setIsOfflineEnvironment(true); setStep('domain_selection'); }}

                  </div>
                )}

                {step === 'domain_selection' && (
                  <div className="flex flex-col h-full animate-in fade-in">
                    <h2 className="text-2xl font-bold text-slate-800 mb-4 border-l-4 border-blue-600 pl-3">指導する領域（6区分27項目）</h2>
                    <div className="flex-1 grid grid-cols-2 gap-4">
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 overflow-y-auto">
                        {domainData.map((d) => (
                          <button key={d.name} onClick={() => setTargetDomain(d.name)} className={`w-full text-left p-4 rounded-lg font-bold mb-2 ${targetDomain === d.name ? 'bg-blue-600 text-white' : 'bg-white border text-slate-700'}`}>{d.name}</button>
                        ))}
                      </div>
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 overflow-y-auto">
                        {targetDomain && domainData.find(d => d.name === targetDomain)?.items.map((item) => (
                          <button key={item} onClick={() => { setTargetItem(item); setStep('scenario_input'); }} className="w-full text-left p-4 rounded-lg font-bold mb-2 bg-white flex justify-between items-center group shadow-sm hover:border-blue-500 border border-transparent">
                            <span className="text-sm">{item}</span><ChevronRight className="w-5 h-5 text-slate-300" />
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {step === 'scenario_input' && (
                  <div className="flex flex-col h-full animate-in fade-in">
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="text-2xl font-bold text-slate-800 border-l-4 border-blue-600 pl-3">プリントの内容設定</h2>
                      <button onClick={() => setStep('domain_selection')} className="px-4 py-2 bg-slate-100 rounded-lg font-bold text-sm">戻る</button>
                    </div>
                    <div className="grid grid-cols-2 gap-6 flex-1 min-h-0">
                      <div className="bg-white rounded-xl border border-slate-200 flex flex-col overflow-hidden">
                        <div className="bg-slate-100 p-3 border-b font-bold text-sm text-slate-700">「{targetDomain}」のよくある事例（全30事例）</div>
                        <div className="p-3 overflow-y-auto flex-1 bg-slate-50">
                          {presetScenarios[targetDomain]?.map((issue, idx) => (
                            <button key={idx} onClick={() => { setScenario(issue.scenario); setCustomGoal(issue.goal); setWorksheetTitle(issue.title); setMangaData({ panels: [...issue.panels] }); }} className="w-full text-left bg-white p-3 rounded-lg border-2 hover:border-blue-500 mb-2 shadow-sm">
                              <div className="font-bold text-sm mb-1">{issue.label}</div>
                              <div className="text-[10px] text-slate-500">{issue.goal.replace(/([一-龠々]+)[(（]([\u3040-\u309F\u30A0-\u30FFー]+)[)）]/g, '$1')}</div>
                            </button>
                          ))}
                        </div>
                      </div>
                      <div className="flex flex-col gap-4 overflow-y-auto pr-2">
                        <div className="bg-blue-50 text-blue-800 p-3 rounded-xl text-xs font-bold border border-blue-200">
                          【重要】漢字の直後にカッコで読みを書いてください。<br/>〇 正しい例： 食事(しょくじ)に 行(い)く
                        </div>
                        <div><label className="block text-sm font-bold mb-1">タイトル</label><input type="text" value={worksheetTitle} onChange={(e) => setWorksheetTitle(e.target.value)} className="w-full p-2 border rounded font-bold" /></div>
                        <div><label className="block text-sm font-bold mb-1">説明文</label><textarea value={scenario} onChange={(e) => setScenario(e.target.value)} className="w-full p-2 h-16 border rounded text-sm resize-none" /></div>
                        <div><label className="block text-sm font-bold mb-1">ねらい</label><textarea value={customGoal} onChange={(e) => setCustomGoal(e.target.value)} className="w-full p-2 h-16 border rounded text-sm resize-none" /></div>
                        <button onClick={() => setStep('manual_edit')} disabled={!scenario || !worksheetTitle} className={`mt-auto py-4 rounded-xl text-lg font-bold shadow-md flex justify-center items-center gap-2 ${!scenario || !worksheetTitle ? 'bg-slate-200' : 'bg-blue-600 text-white'}`}>次へ <ChevronRight /></button>
                      </div>
                    </div>
                  </div>
                )}

                {step === 'manual_edit' && (
                  <div className="flex flex-col h-full animate-in fade-in">
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="text-2xl font-bold text-slate-800 border-l-4 border-blue-600 pl-3">各コマのセリフと絵の指示</h2>
                      <select value={textStyle} onChange={(e) => setTextStyle(e.target.value)} className="p-1 border rounded text-sm font-bold bg-yellow-50 outline-none">
                        <option value="ruby">漢字（ルビあり）</option>
                        <option value="hiragana">すべてひらがな</option>
                        <option value="kanji">漢字（ルビなし）</option>
                      </select>
                    </div>
                    <div className="grid grid-cols-4 gap-4 flex-1 overflow-hidden">
                      {mangaData.panels.map((panel, idx) => (
                        <div key={idx} className="bg-white border rounded-xl overflow-hidden flex flex-col shadow-sm">
                          <div className="bg-slate-100 p-2 font-bold text-center text-sm border-b">コマ {idx + 1}</div>
                          <div className="p-3 space-y-3 flex flex-col h-full">
                            <div className="flex-1 flex flex-col"><label className="text-[10px] font-bold mb-1">絵の指示</label><textarea value={panel.scene} onChange={(e) => { const newPanels = [...mangaData.panels]; newPanels[idx].scene = e.target.value; setMangaData({...mangaData, panels: newPanels}); }} className="flex-1 w-full p-2 border rounded bg-slate-50 text-xs resize-none" /></div>
                            <div className="flex-1 flex flex-col"><label className="text-[10px] font-bold text-blue-600 mb-1">セリフ</label><textarea value={panel.dialogue} onChange={(e) => { const newPanels = [...mangaData.panels]; newPanels[idx].dialogue = e.target.value; setMangaData({...mangaData, panels: newPanels}); }} className="flex-1 w-full p-2 border-2 border-blue-100 rounded text-sm font-bold resize-none" /></div>
                          </div>
                        </div>
                      ))}
                    </div>
                    <div className="mt-4 flex justify-between">
                      <button onClick={() => setStep('scenario_input')} className="px-6 py-2 border rounded-lg font-bold">戻る</button>
                      <button onClick={() => { setElements([]); setStep('preview'); }} className="px-12 py-3 bg-green-600 text-white rounded-lg text-lg font-bold flex items-center gap-2 shadow-md hover:bg-green-700">キャンバスエディタへ</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          ) : (
            // --- Step 5: キャンバスエディタ ---
            <>
              <div className="w-[794px] bg-white p-4 rounded-t-xl shadow-lg border-b border-slate-200 flex justify-between items-center no-print z-50 sticky top-0 mt-4">
                <div className="flex items-center gap-2">
                  <button onClick={() => setStep('manual_edit')} className="px-3 py-1.5 bg-slate-100 text-slate-700 rounded font-bold text-sm hover:bg-slate-200 flex items-center gap-1"><ChevronLeft className="w-4 h-4"/> 戻る</button>
                  <div className="h-6 w-px bg-slate-300 mx-1"></div>
                  <button onClick={addNewText} className="px-3 py-1.5 bg-slate-100 rounded font-bold text-sm hover:bg-slate-200 flex items-center gap-1"><Type className="w-4 h-4"/> テキスト</button>
                  <label className="px-3 py-1.5 bg-slate-100 rounded font-bold text-sm hover:bg-slate-200 flex items-center gap-1 cursor-pointer">
                    <ImageIcon className="w-4 h-4"/> 画像
                    <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                  </label>
                  <div className="h-6 w-px bg-slate-300 mx-1"></div>
                  <button onClick={handleSave} className="px-3 py-1.5 bg-blue-50 text-blue-700 border border-blue-200 rounded font-bold text-sm hover:bg-blue-100 flex items-center gap-1"><Save className="w-4 h-4"/> 保存</button>
                  <label className="px-3 py-1.5 bg-blue-50 text-blue-700 border border-blue-200 rounded font-bold text-sm hover:bg-blue-100 flex items-center gap-1 cursor-pointer">
                    <FolderOpen className="w-4 h-4"/> 読込
                    <input type="file" accept=".json" onChange={handleLoad} className="hidden" />
                  </label>
                  <button onClick={() => setBindingMargin(!bindingMargin)} className={`px-3 py-1.5 rounded font-bold text-sm border flex items-center gap-1 ${bindingMargin ? 'bg-blue-100 text-blue-700 border-blue-300' : 'bg-slate-100 text-slate-600 border-transparent hover:bg-slate-200'}`}>
                    <FileBox className="w-4 h-4" />とじ代
                  </button>
                </div>
                
                <div className="flex items-center gap-2">
                  {selectedId && (
                    <>
                      <button onClick={() => updateElement(selectedId, { fontSize: (elements.find(e=>e.id===selectedId)?.fontSize || 16) + 2 })} className="p-1.5 hover:bg-slate-100 rounded text-slate-600"><ZoomIn className="w-4 h-4"/></button>
                      <button onClick={() => updateElement(selectedId, { fontSize: Math.max(10, (elements.find(e=>e.id===selectedId)?.fontSize || 16) - 2) })} className="p-1.5 hover:bg-slate-100 rounded text-slate-600"><ZoomOut className="w-4 h-4"/></button>
                      <button onClick={() => deleteElement(selectedId)} className="p-1.5 hover:bg-red-100 text-red-600 rounded"><Trash2 className="w-4 h-4"/></button>
                      <div className="h-6 w-px bg-slate-300 mx-1"></div>
                    </>
                  )}
                  <button onClick={() => setShowPromptModal(true)} className="px-3 py-1.5 bg-slate-100 text-slate-600 rounded font-bold text-sm hover:bg-slate-200">プロンプト</button>
                  <button onClick={() => { setSelectedId(null); setTimeout(()=>window.print(), 100); }} className="px-4 py-1.5 bg-slate-800 text-white rounded font-bold text-sm flex items-center gap-1 shadow-sm hover:bg-black"><Printer className="w-4 h-4"/> 印刷</button>
                </div>
              </div>

              <div className="w-full flex-1 overflow-auto flex justify-center py-6 print:p-0 print:overflow-hidden bg-slate-200 print:bg-white">
                
                <div 
                  id="print-wrapper"
                  className="print:w-[210mm] print:h-[295mm] print:m-0 print:box-border print:overflow-hidden print:bg-white transition-all duration-300"
                  style={{ marginLeft: bindingMargin ? '60px' : '0px' }}
                >
                  
                  <div 
                    id="print-area" 
                    ref={containerRef}
                    className="bg-white shadow-2xl relative print:shadow-none"
                    style={{ width: '718px', height: '1020px' }}
                    onPointerDown={() => setSelectedId(null)}
                  >
                    {elements.map(el => {
                      const baseBorder = el.border ? `3px solid ${el.borderColor || '#1e293b'}` : 'none';
                      const bottomBorder = el.borderBottom ? `3px solid #1e293b` : baseBorder;

                      return (
                        <div
                          key={el.id}
                          className={`absolute group ${selectedId === el.id ? 'z-50' : 'z-10'}`}
                          style={{
                            left: el.x, top: el.y, width: el.width, height: el.height,
                            backgroundColor: el.bg || 'transparent',
                            boxSizing: 'border-box',
                            borderTop: baseBorder,
                            borderRight: baseBorder,
                            borderLeft: baseBorder,
                            borderBottom: bottomBorder,
                            borderRadius: el.borderRadius || 0,
                            padding: el.padding || 0,
                            cursor: selectedId === el.id ? 'move' : 'pointer',
                            outline: selectedId === el.id ? '2px solid #3b82f6' : 'none',
                            outlineOffset: '2px'
                          }}
                          onPointerDown={(e) => handlePointerDown(e, el.id, 'move')}
                        >
                          {el.type === 'text' && (
                            <div className="w-full h-full p-1" style={{ textAlign: el.align }}>
                              {selectedId === el.id && isEditingTextId === el.id ? (
                                <textarea 
                                  autoFocus
                                  value={el.text}
                                  onChange={(e) => updateElement(el.id, { text: e.target.value })}
                                  onBlur={() => setIsEditingTextId(null)}
                                  className="w-full h-full bg-transparent border-none outline-none resize-none overflow-hidden text-blue-800"
                                  style={{ textAlign: el.align, fontSize: el.fontSize, fontWeight: el.fontWeight }}
                                />
                              ) : (
                                <div 
                                  className="w-full break-all whitespace-pre-wrap inline-block" 
                                  onDoubleClick={(e) => { e.stopPropagation(); setIsEditingTextId(el.id); }} 
                                  style={{ fontSize: el.fontSize, fontWeight: el.fontWeight, lineHeight: 1.8 }}
                                >
                                  {renderText(el.text)}
                                </div>
                              )}
                            </div>
                          )}

                          {el.type === 'image' && (
                            <img src={el.src} alt="" className="w-full h-full object-contain pointer-events-none" />
                          )}

                          {el.type === 'manga_placeholder' && (
                            <div className="w-full h-full relative bg-slate-50 flex items-center justify-center overflow-hidden box-border">
                              {el.src ? (
                                <img src={el.src} alt="Manga" className="w-full h-full object-contain pointer-events-none" />
                              ) : (
                                <div className="text-center text-slate-400">
                                  <ImageIcon className="w-16 h-16 mx-auto mb-2 opacity-50" />
                                  <span className="font-bold text-sm">{textStyle === 'hiragana' ? 'AIで つくった えを ここに はります' : 'AIで生成した画像をここに配置します'}</span>
                                </div>
                              )}
                              {!isOfflineEnvironment && (
                                <button 
                                  onPointerDown={(e) => e.stopPropagation()}
                                  onClick={handleGenerateComic}
                                  disabled={isGeneratingImage}
                                  className="absolute bottom-4 right-4 px-4 py-2 bg-blue-600 text-white rounded-full font-bold shadow-lg z-50 text-sm flex items-center gap-2 hover:bg-blue-700 no-print"
                                >
                                  {isGeneratingImage ? <RefreshCcw className="w-4 h-4 animate-spin" /> : <ImageIcon className="w-4 h-4" />}
                                  {isGeneratingImage ? '生成中...' : '画像を自動生成'}
                                </button>
                              )}
                            </div>
                          )}

                          {selectedId === el.id && (
                            <div 
                              className="absolute -right-2 -bottom-2 w-4 h-4 bg-white border-2 border-blue-500 rounded-full cursor-se-resize z-50 no-print"
                              onPointerDown={(e) => handlePointerDown(e, el.id, 'resize')}
                            />
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </>
          )}

          {showPromptModal && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[200] p-6 no-print">
              <div className="bg-white rounded-3xl w-full max-w-2xl overflow-hidden flex flex-col shadow-2xl">
                <div className="p-4 bg-slate-800 text-white flex justify-between items-center">
                  <h2 className="text-lg font-bold flex items-center gap-2"><ImageIcon className="w-5 h-5"/> セリフ入りイラスト生成用プロンプト</h2>
                  <button onClick={() => setShowPromptModal(false)} className="p-1 hover:bg-white/20 rounded"><X/></button>
                </div>
                <div className="p-6 bg-slate-50 text-sm text-slate-600">
                  <p className="mb-4 font-bold text-blue-700">外部AI（ChatGPT等）に以下の英文をそのまま貼り付けてください。</p>
                  <textarea 
                    readOnly 
                    value={generatePromptText()}
                    className="w-full h-56 p-4 bg-white border border-slate-300 rounded-lg font-mono text-[10px] focus:outline-none"
                  />
                </div>
                <div className="p-4 bg-white border-t flex justify-end gap-3">
                  <button onClick={() => setShowPromptModal(false)} className="px-4 py-2 border rounded font-bold text-slate-600">閉じる</button>
                  <button 
                    onClick={() => { copyToClipboard(generatePromptText()); setShowPromptModal(false); }}
                    className="px-6 py-2 bg-blue-600 text-white rounded font-bold flex items-center gap-2"
                  >
                    <Copy className="w-4 h-4"/> コピーする
                  </button>
                </div>
              </div>
            </div>
          )}

          {showCopyMessage && (
            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full font-bold flex items-center gap-2 z-[300] shadow-xl">
              <CheckCircle2 className="w-5 h-5 text-green-400" /> 保存/コピーしました
            </div>
          )}

          <style>{"\
            ruby { ruby-align: center; ruby-position: over; vertical-align: baseline; }\n\
            rt { font-size: 0.6em; color: #334155; font-weight: bold; }\n\
            @media print {\n\
              html, body {\n\
                width: 210mm !important;\n\
                height: 295mm !important;\n\
                margin: 0 !important;\n\
                padding: 0 !important;\n\
                overflow: hidden !important;\n\
                background-color: white !important;\n\
              }\n\
              .no-print, .no-print * { display: none !important; }\n\
              body > *:not(#root) { display: none !important; }\n\
              #root, #app-container, .fixed.inset-0 {\n\
                position: static !important;\n\
                width: 210mm !important;\n\
                height: 295mm !important;\n\
                overflow: hidden !important;\n\
                display: block !important;\n\
                background: white !important;\n\
                transform: none !important;\n\
                margin: 0 !important;\n\
                padding: 0 !important;\n\
              }\n\
              #print-wrapper {\n\
                display: block !important;\n\
                position: relative !important;\n\
                width: 210mm !important;\n\
                height: 295mm !important;\n\
                margin: 0 !important;\n\
                padding: 0 !important;\n\
                box-sizing: border-box !important;\n\
                overflow: hidden !important;\n\
                page-break-after: avoid !important;\n\
                page-break-before: avoid !important;\n\
                page-break-inside: avoid !important;\n\
              }\n\
              #print-area { \n\
                position: absolute !important;\n\
                top: 10mm !important; \n\
                left: " + (bindingMargin ? '25mm' : '10mm') + " !important; \n\
                margin: 0 !important; \n\
                padding: 0 !important;\n\
                transform-origin: top left !important;\n\
                transform: scale(" + (bindingMargin ? 0.92 : 0.98) + ") !important;\n\
                box-shadow: none !important; \n\
                overflow: visible !important;\n\
                background-color: transparent !important;\n\
              }\n\
              @page { size: A4 portrait; margin: 0; }\n\
            }\n\
          "}</style>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
